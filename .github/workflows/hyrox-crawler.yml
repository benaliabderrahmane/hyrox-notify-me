name: HYROX Ticket Crawler

on:
  #schedule:
  #  # Run every hour from 7:00 to 18:00 UTC (8am to 7pm Berlin time)
  #  - cron: '0 6-18 * * *'
  workflow_dispatch:  # Allow manual triggering
  #push:
  #  branches:
  #    - main

jobs:
  crawl-hyrox:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push notified_events.json updates

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run HYROX crawler
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        echo "🚀 Starting HYROX crawler at $(date)"
        echo "🌍 Timezone info: $(date -u) UTC"
        echo "🇩🇪 Berlin time: $(TZ=Europe/Berlin date)"
        python crawl_hyrox.py

    - name: Commit notification state
      if: always()
      run: |
        if [ -n "$(git status --porcelain notified_events.json)" ]; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notified_events.json
          git commit -m "chore: update notified_events state"
          git push
        else
          echo "No state changes to commit."
        fi

    - name: Log completion
      if: always()
      run: |
        echo "✅ Crawler completed at $(date)"
        echo "📊 Exit code: $?"
